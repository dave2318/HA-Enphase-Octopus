blueprint:
  name: "Energy: Battery Grid Charge Controller (Dynamic Target)"
  description: >-
    Manages CFG mode based on solar forecast and arbitrage profitability.
    Dynamically calculates a target SOC based on tomorrow's morning Solcast data to prevent solar displacement.
    Includes a 30-minute midnight shift to align energy data to a single calendar day.
  domain: automation
  input:
    cfg_sensor_soc:
      name: Battery SOC Sensor
      description: The sensor tracking your physical battery percentage.
      selector:
        entity:
          domain: sensor
          device_class: battery
    cfg_switch_export:
      name: Battery Export Switch (DTG)
      selector:
        entity:
          domain: switch
    cfg_switch_charge:
      name: Battery Grid Charge Switch (CFG)
      selector:
        entity:
          domain: switch
    cfg_event_import_today:
      name: Octopus Import Rates Today
      selector:
        entity:
          domain: event
    cfg_event_import_tomorrow:
      name: Octopus Import Rates Tomorrow
      selector:
        entity:
          domain: event
    cfg_event_export_tomorrow:
      name: Octopus Export Rates Tomorrow
      selector:
        entity:
          domain: event
    cfg_notify_service:
      name: Notification Entity
      default: notify.notify
      selector:
        text:

# ====================================================
# AUTOMATION LOGIC
# ====================================================
mode: single

triggers:
  - at: "23:30:00"
    trigger: time

actions:
  - condition: template
    value_template: >-
      {% set dtg = states[cfg_switch_export].last_changed %}  
      {% set cfg = states[cfg_switch_charge].last_changed %}  
      {% set dtg_ok = dtg is none or (now() - dtg).total_seconds() > 120 %}  
      {% set cfg_ok = cfg is none or (now() - cfg).total_seconds() > 120 %}  
      {{ dtg_ok and cfg_ok }}
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not should_charge }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: "{{ cfg_switch_charge }}"
          - action: logbook.log
            data:
              name: Grid Charge Controller
              message: >-
                Skipped Grid Charge. Forecast: {{ forecast_val }}kWh.
              entity_id: "{{ cfg_switch_charge }}"
          - action: "{{ cfg_notify_service }}"
            data:
              title: "📊 Daily Energy Audit: CFG Stopped"
              message: |
                STATUS: GRID CHARGING OFF 
                REASON: Sun will handle tomorrow's load.

                SOLAR DATA: 
                - Tomorrow's Forecast: {{ forecast_val }} kWh 
                - Morning Yield (05:30-11:00): {{ morning_yield | round(2) }} kWh
                
      - conditions:
          - condition: template
            value_template: "{{ should_charge }}"
        sequence:
          # 1. Log and Notify the plan immediately at 23:30
          - action: logbook.log
            data:
              name: Grid Charge Controller
              message: "Grid Charge Approved. Waiting until midnight to start. Target SOC: {{ target_soc }}%."
              entity_id: "{{ cfg_switch_charge }}"
          - action: "{{ cfg_notify_service }}"
            data:
              title: "📊 Daily Energy Audit: CFG Scheduled"
              message: |
                STATUS: CHARGE APPROVED (Starts at 00:00)
                TARGET SOC: {{ target_soc }}%

                CALCULATIONS:
                - Tomorrow's Forecast: {{ forecast_val }} kWh
                - Morning Yield (05:30-11:00): {{ morning_yield | round(2) }} kWh
                - Morning Deficit: {{ morning_deficit | round(2) }} kWh

          # 2. WAIT 30 MINUTES SO ALL ENERGY USAGE REGISTERS ON THE NEW CALENDAR DAY
          - delay: "00:30:00"

          # 3. Turn on the charger at exactly 00:00
          - action: switch.turn_on
            target:
              entity_id: "{{ cfg_switch_charge }}"
          
          # 4. Wait until SOC hits Target OR 5.5 hours pass (05:30 AM)
          - wait_template: "{{ states(cfg_sensor_soc) | float(0) >= target_soc | float(0) }}"
            timeout: "05:30:00"
            continue_on_timeout: true
            
          # 5. Turn off the charger cleanly
          - action: switch.turn_off
            target:
              entity_id: "{{ cfg_switch_charge }}"
          
          - action: logbook.log
            data:
              name: Grid Charge Controller
              message: "Finished Grid Charge. Reached Target SOC or Timeout."
              entity_id: "{{ cfg_switch_charge }}"

variables:
  cfg_sensor_soc: !input cfg_sensor_soc
  cfg_switch_export: !input cfg_switch_export
  cfg_switch_charge: !input cfg_switch_charge
  cfg_notify_service: !input cfg_notify_service
  cfg_event_import_today: !input cfg_event_import_today
  cfg_event_import_tomorrow: !input cfg_event_import_tomorrow
  cfg_event_export_tomorrow: !input cfg_event_export_tomorrow
  
  sys_rte: "{{ states('input_number.battery_efficiency_rte') | float(0.83) }}"
  forecast_val: "{{ states('sensor.combined_solar_forecast_tomorrow') | float(0) }}"
  threshold_val: "{{ states('input_number.grid_charge_forecast_threshold') | float(12.0) }}"
  forecast_low: "{{ forecast_val < threshold_val }}"
  
  # Scan Solcast for morning yield (05:00 to 11:00)
  morning_yield: >
    {% set tom_forecast_data = state_attr('sensor.solcast_pv_forecast_forecast_tomorrow', 'detailedForecast') %}
    {% set ns = namespace(yield=0.0) %}
    {% if tom_forecast_data %}
      {% for slot in tom_forecast_data %}
        {% set slot_dt = as_datetime(slot.period_start) | as_local %}
        {% if slot_dt >= today_at('05:00') + timedelta(days=1) and slot_dt < today_at('11:00') + timedelta(days=1) %}
          {% set ns.yield = ns.yield + slot.pv_estimate | float(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.yield }}

  # Calculate deficit assuming ~2.5 kWh morning usage
  morning_deficit: "{{ [0.0, 2.5 - (morning_yield | float(0))] | max }}"
  
  # Calculate Target SOC (100% if bad weather, otherwise current + deficit + 5% buffer)
  target_soc: >
    {% if forecast_low %}
      100
    {% else %}
      {% set current_soc = states(cfg_sensor_soc) | float(0) %}
      {% set needed_soc = ((morning_deficit / 5.0) * 100) + 5 %}
      {{ [100, current_soc + needed_soc] | min | round(0) }}
    {% endif %}

  # Let the template sensor dictate the primary GO/NO-GO
  should_charge: "{{ is_state('binary_sensor.grid_charge_recommended', 'on') }}"
