- trigger:
    - platform: time
      at: "16:30:00"
      id: "start"
    - platform: time
      at: "23:30:00"
      id: "end"
  sensor:
    - name: "Evening Consumption Baseline"
      unique_id: evening_consumption_baseline_tracker
      unit_of_measurement: "kWh"
      state: >
        {% if trigger.id == 'start' %}
          {% set state = states('sensor.envoy_EnvoyMAC_energy_consumption_today') %}
          {% if state in ['unknown', 'unavailable'] %}
            {{ this.state | default(0) }}
          {% else %}
            {{ state | float(0) }}
          {% endif %}
        {% else %}
          {{ this.state | default(0) }}
        {% endif %}
        
    - name: "Last Evening Usage"
      unique_id: last_evening_usage_tracker
      unit_of_measurement: "kWh"
      icon: mdi:home-lightning-bolt
      state: >
        {% if trigger.id == 'end' %}
          {% set raw_current = states('sensor.envoy_EnvoyMAC_energy_consumption_today') %}
          {% if raw_current in ['unknown', 'unavailable'] %}
            {{ this.state | default(0) }}
          {% else %}
            {% set current = raw_current | float(0) %}
            {% set start_val = states('sensor.evening_consumption_baseline') | float(0) %}
            {% set diff = current - start_val %}
            {% set is_holiday = is_state('input_boolean.holiday_mode', 'on') %}
            
            {% if diff > 0 and start_val > 0 and diff < 20 and not is_holiday %}
              {{ diff | round(2) }}
            {% else %}
              {{ this.state | default(0) }}
            {% endif %}
          {% endif %}
        {% else %}
          {{ this.state | default(0) }}
        {% endif %}
      attributes:
        history_array: >
          {% if trigger.id == 'end' %}
            {% set raw_current = states('sensor.envoy_EnvoyMAC_energy_consumption_today') %}
            {% if raw_current in ['unknown', 'unavailable'] %}
              {{ this.attributes.history_array | default([]) }}
            {% else %}
              {% set current = raw_current | float(0) %}
              {% set start_val = states('sensor.evening_consumption_baseline') | float(0) %}
              {% set diff = (current - start_val) | round(2) %}
              {% set hist = this.attributes.history_array | default([]) %}
              {% set is_holiday = is_state('input_boolean.holiday_mode', 'on') %}
              
              {% if diff > 0 and start_val > 0 and diff < 20 and not is_holiday %}
                {{ (hist + [diff])[-7:] }}
              {% else %}
                {{ hist }}
              {% endif %}
            {% endif %}
          {% else %}
            {{ this.attributes.history_array | default([]) }}
          {% endif %}

- sensor:
    - name: "Average Evening Usage 7d"
      unique_id: stat_avg_evening_usage_7d_template
