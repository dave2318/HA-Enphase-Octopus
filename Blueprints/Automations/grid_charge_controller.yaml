blueprint:
  name: "Energy: Battery Grid Charge Controller (V6.2 Self-Tuning)"
  description: >-
    Manages CFG mode based on your master Calculated Target SOC sensor.
  domain: automation
  input:
    cfg_sensor_soc:
      name: Battery SOC Sensor
      selector:
        entity:
          domain: sensor
          device_class: battery
    cfg_sensor_target_soc:
      name: Calculated Target SOC Sensor
      description: The master template sensor that calculates your daily target.
      selector:
        entity:
          domain: sensor
    cfg_switch_export:
      name: Battery Export Switch (DTG)
      selector:
        entity:
          domain: switch
    cfg_switch_charge:
      name: Battery Grid Charge Switch (CFG)
      selector:
        entity:
          domain: switch
    cfg_notify_service:
      name: Notification Entity
      default: notify.notify
      selector:
        text:

mode: single

triggers:
  # V6.2: Bulletproof midnight trigger for clean daily billing metrics
  - at: "00:00:00"
    trigger: time

actions:
  - condition: template
    value_template: >-
      {% set dtg = states[cfg_switch_export].last_changed %}  
      {{ dtg == None or (now() - dtg).total_seconds() > 60 }}

  - variables:
      # Reads directly from your brilliant templates.yaml Brain!
      target_soc: "{{ states(cfg_sensor_target_soc) | float(0) }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ states(cfg_sensor_soc) | float(0) < target_soc }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: "{{ cfg_switch_charge }}"
          
          - action: "{{ cfg_notify_service }}"
            data:
              title: "🔋 Grid Charging Started"
              message: >-
                Target SOC set to {{ target_soc }}% by the master prediction engine.
          
          # V6.2 Hold at 100 Logic (Prevents Winter Leak)
          - wait_template: >
              {{ (states(cfg_sensor_soc) | float(0) >= target_soc) and (target_soc < 100) }}
            timeout: "05:29:00"
            continue_on_timeout: true
            
          - action: switch.turn_off
            target:
              entity_id: "{{ cfg_switch_charge }}"
