title: Energy & Export
views:
  - title: Smart Export Controller
    path: smart_export_controller
    icon: mdi:solar-power
    cards:
      - type: glance
        title: Financial Summary
        entities:
          - entity: >-
              sensor.octopus_energy_electricity_OctopusImportMPAN_current_rate
            name: Import Rate
          - entity: >-
              sensor.octopus_energy_electricity_OctopusExportMPAN_export_current_rate
            name: Export Rate
          - entity: sensor.export_profitability
            name: Net Profit/kWh
          - entity: sensor.today_export_profit_accumulative
            name: Earned Today
          - entity: sensor.today_peak_dtg_profit
            name: Peak Dump Profit
          - entity: sensor.today_peak_dtg_export
            name: Peak Dump Vol.
          - entity: input_number.lifetime_solar_savings
      - type: horizontal-stack
        cards:
          - type: gauge
            name: Battery SOC
            unit: '%'
            entity: sensor.envoy_EnvoyMAC_battery
            min: 0
            max: 100
            severity:
              green: 20
              yellow: 10
              red: 0
          - type: gauge
            name: Real-Time Export Profit
            unit: p
            entity: sensor.export_profitability
            min: -15
            max: 35
            needle: true
            severity:
              green: 0.1
              yellow: -5
              red: -15
      - type: markdown
        title: Next Expected Behaviour
        content: >
          {% set soc = states('sensor.envoy_EnvoyMAC_battery') | float(0) %}
          {% set floor = states('sensor.battery_export_floor') | float(0) %}  {%
          set reserve = states('sensor.dynamic_reserve') | float(0) %}  {% set
          winter = is_state('input_boolean.winter_mode', 'on') %}  {% set
          holiday = is_state('input_boolean.holiday_mode', 'on') %}  {% set
          is_profitable = states('sensor.export_profitability') | float(0) > 0
          %}  {% set car = is_state('binary_sensor.hard_block_active', 'on') %}
          {% set smart_peak = is_state('binary_sensor.smart_peak_export_active',
          'on') %}

          {# NEW: Detect if the Rescue Charge is running #} {% set rescue =
          is_state('switch.enphase_cfg_mode', 'on') and
          is_state('binary_sensor.octopus_energy_IntelligentDispatchVehicleId_intelligent_dispatching',
          'on') and (now().hour >= 5 and now().hour < 23) %}

          **Current Strategy:** {% if holiday %}
            ✈️ **HOLIDAY MODE:** Maximizing exports. AI tracking frozen.
          {% elif rescue %}
            🚑 **IOG RESCUE:** Octopus triggered a cheap daytime slot! Topping up a low battery.
          {% elif car %}
            🚗 **BLOCK:** EV is charging or in cheap window.
          {% elif winter and is_profitable and soc < floor %}
            ❄️ **WINTER HOLD:** Profitable, but SOC {{soc}}% is below winter floor ({{floor}}%).
          {% elif soc < reserve and not is_profitable and not smart_peak %}
            🔋 **HOLDING:** SOC {{soc}}% is below Reserve ({{reserve}}%).
          {% elif is_profitable or smart_peak %}
            💸 **EXPORTING:** Active for {{ 'Profit' if is_profitable else 'Smart Peak Surplus' }}.
          {% else %}
            🏠 **HOUSE LOAD:** Saving power for home usage.
          {% endif %}
      - type: markdown
        title: 🚦 Export Logic Checklist
        content: >-
          {% set soc = states('sensor.envoy_EnvoyMAC_battery') | float(0) %}

          {% set floor = states('sensor.battery_export_floor') | float(0) %} 

          {% set profit_val = states('sensor.export_profitability') | float(0)
          %}

          {% set winter = is_state('input_boolean.winter_mode', 'on') %} 

          {% set holiday = is_state('input_boolean.holiday_mode', 'on') %} 

          {% set car = is_state('binary_sensor.hard_block_active', 'on') %} 

          {% set peak = is_state('binary_sensor.in_peak_window', 'on') %}  

          {% set smart_peak = is_state('binary_sensor.smart_peak_export_active',
          'on') %}


          **Blocks** - Car/Cheap Window Inactive {{ '✅' if not car else '❌' }} 

          - Winter Safety Check {{ '✅' if not winter or holiday or (winter and
          soc > floor) or smart_peak else '⚠️' }}


          **Triggers** - Profit Opportunity ({{ profit_val }}p) {{ '✅' if
          profit_val > 0 else '❌' }} 

          - Smart Peak Surplus {{ '✅' if smart_peak else '❌' }}


          --- 

          **System Verdict:** {% if car %}
            🛑 BLOCKED (EV/CHEAP)
          {% elif holiday and profit_val > 0 %}
            ✈️ HOLIDAY EXPORT
          {% elif winter and profit_val > 0 and soc < floor and not smart_peak
          %}
            ❄️ WINTER PROTECT
          {% elif profit_val > 0 or smart_peak %}
            ✅ READY TO EXPORT
          {% else %}
            🏠 HOLDING FOR HOUSE
          {% endif %}
      - type: markdown
        title: Grid Charge Decision (23:30)
        content: >
          {% set target = states('sensor.calculated_target_soc') | float(0) %}
          {% set current = states('sensor.envoy_EnvoyMAC_battery') |
          float(0) %} {% set forecast =
          states('sensor.combined_solar_forecast_tomorrow') | float(0) %} {% set
          threshold = states('input_number.grid_charge_forecast_threshold') |
          float(12.0) %}

          {# Arbitrage Math for the UI #} {% set rte =
          states('input_number.battery_efficiency_rte') | float(0.83) %} {% set
          raw_imp =
          states('sensor.octopus_energy_electricity_OctopusImportMPAN_current_rate')
          | float(0) %} {% set import_rate = (raw_imp * 100) if raw_imp < 1.0
          else raw_imp %}

          {% set export_event =
          state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_next_day_rates',
          'rates') or [] %} {% set current_event =
          state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_current_day_rates',
          'rates') or [] %} {% set rates = export_event if export_event | length
          > 0 else current_event %}

          {% set ns = namespace(total=0.0, count=0) %} {% for r in rates %}
            {% set start_dt = as_datetime(r.start) | as_local %}
            {% if start_dt.time() >= strptime('09:00', '%H:%M').time() and start_dt.time() < strptime('16:00', '%H:%M').time() %}
              {% set val = r.value_inc_vat %}
              {% set rate_p = (val * 100) if val < 1.0 else val %}
              {% set ns.total = ns.total + rate_p %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %} {% set avg_day_export = (ns.total / ns.count) if ns.count
          > 0 else 0 %} {% set is_profitable = (avg_day_export * rte) >
          import_rate %}

          **System Verdict:** {% if target > current %} ✅ CHARGING TONIGHT {%
          else %} 💤 STAYING IDLE {% endif %}

          **Target SOC:** {{ target | round(0) }}% *(Current: {{ current |
          round(0) }}%)*

          **Why?** {% if is_profitable %} 📈 **Wall Street Mode:** Tomorrow's
          average daytime export rate ({{ avg_day_export | round(2) }}p) beats
          tonight's import rate ({{ import_rate | round(2) }}p) even after
          battery loss. Filling to 100% so all daytime solar is forced out to
          the grid for pure profit!

          {% elif forecast < threshold %} ☁️ **Bad Weather Override:**
          Tomorrow's solar forecast ({{ forecast | round(1) }} kWh) is below the
          {{ threshold }} kWh safety limit. Charging to 100% to protect the
          house.

          {% else %} 🛡️ **Dynamic Survival Charge:** Tomorrow's sun is great.
          Target set to {{ target | round(0) }}% to survive the overnight burn
          rate without wasting space for tomorrow's free solar. {% endif %}
      - type: entities
        title: Controls & Overrides
        show_header_toggle: false
        entities:
          - entity: switch.enphase_dtg_mode
            name: Force Export / Last Action
            type: simple-entity
            secondary_info: last-changed
          - entity: switch.enphase_cfg_mode
            name: Force Charge / Last Action
            type: simple-entity
            secondary_info: last-changed
      - type: entities
        title: System Stats & Weather
        entities:
          - type: section
            label: Live Status
          - entity: binary_sensor.hard_block_active
            name: Hard Block (EV/Cheap)
          - entity: binary_sensor.in_peak_window
            name: Peak Period
          - entity: sensor.next_greener_night
          - type: section
            label: Evening & Export Strategy
          - entity: sensor.dynamic_reserve
            name: Current Dynamic Reserve Target
          - entity: sensor.battery_export_floor
            name: Peak Export Floor
          - entity: sensor.today_s_golden_export_slot
            name: Today's Golden Export Slot
            icon: mdi:clock-fast
          - entity: sensor.average_evening_usage_7d
            name: 7-Day Avg Evening Usage (Learned)
          - entity: sensor.battery_time_remaining_real_world
            name: Battery Hours Left (Smoothed)
          - entity: sensor.battery_depleted_at
            name: Expected Depletion Time
          - type: section
            label: Morning Charge Strategy
          - entity: sensor.calculated_target_soc
            name: Target SOC (Overnight Charge)
          - entity: sensor.average_morning_usage_7d
            name: 7-Day Avg Morning Usage (Learned)
          - entity: sensor.morning_solar_yield_forecast
            name: Morning Solar Yield Forecast
          - type: section
            label: Solar Forecaster
          - entity: sensor.combined_solar_forecast_today
            name: Total Expected Today
          - entity: sensor.envoy_EnvoyMAC_energy_production_today
            name: Generated Today
          - entity: sensor.combined_solar_forecast_remaining
            name: Solar Left Today
          - entity: sensor.combined_solar_forecast_tomorrow
            name: Total Expected Tomorrow
      - type: history-graph
        title: SOC vs Reserve (Last 24h)
        hours_to_show: 24
        entities:
          - entity: sensor.envoy_EnvoyMAC_battery
            name: Battery SOC
          - entity: sensor.dynamic_reserve
            name: Reserve Target
          - entity: sensor.battery_export_floor
      - type: history-graph
        title: Solar Generation (Last 24h)
        hours_to_show: 24
        entities:
          - entity: sensor.envoy_EnvoyMAC_current_power_production
            name: Actual (kW)
          - entity: sensor.combined_solar_forecast_power
            name: Estimate (kW)
      - type: history-graph
        title: Solar Generation (Last Week)
        hours_to_show: 168
        entities:
          - entity: sensor.envoy_EnvoyMAC_current_power_production
            name: Actual (kW)
      - type: history-graph
        title: Profitability Trend (Last 24h)
        hours_to_show: 24
        entities:
          - entity: sensor.export_profitability
            name: Net Profit (p)
      - type: custom:apexcharts-card
        header:
          show: true
          title: Export Rates (Today & Tomorrow)
          show_states: false
          colorize_states: true
        graph_span: 48h
        span:
          start: day
        now:
          show: true
          label: Now
          color: '#ff0000'
        yaxis:
          - min: 0
            decimals: 1
        series:
          - entity: >-
              event.octopus_energy_electricity_OctopusExportMPAN_export_current_day_rates
            name: Today's Rates
            unit: p
            type: area
            curve: stepline
            opacity: 0.3
            color: '#00b300'
            extend_to: false
            show:
              legend_value: false
            data_generator: |
              return entity.attributes.rates.map((entry) => {
                return [new Date(entry.start).getTime(), (entry.value_inc_vat * 100)];
              });
          - entity: >-
              event.octopus_energy_electricity_OctopusExportMPAN_export_next_day_rates
            name: Tomorrow's Rates
            unit: p
            type: area
            curve: stepline
            opacity: 0.3
            color: '#0080ff'
            extend_to: false
            show:
              legend_value: false
            data_generator: >
              if (!entity || !entity.attributes || !entity.attributes.rates)
              return [];

              return entity.attributes.rates.map((entry) => {
                return [new Date(entry.start).getTime(), (entry.value_inc_vat * 100)];
              });
      - type: history-graph
        title: Power Flow (Last 24h)
        hours_to_show: 24
        entities:
          - entity: sensor.solar_production_clean_kw
            name: Solar Production (kW)
          - entity: sensor.house_consumption_clean_kw
            name: House Consumption (kW)
          - entity: sensor.grid_net_power_kw
            name: Grid Net Import/Export (kW)
      - type: vertical-stack
        cards:
          - type: entities
            title: Gateway Health Monitor
            show_header_toggle: false
            entities:
              - entity: binary_sensor.enphase_gateway_status
                name: Current Connection
                secondary_info: last-changed
              - entity: sensor.envoy_EnvoyMAC_battery
                name: Gateway Heartbeat (SOC)
          - type: logbook
            title: Recent Connection Drops
            entities:
              - binary_sensor.enphase_gateway_status
            hours_to_show: 48
      - type: entities
        title: System Variables
        entities:
          - type: section
            label: Core Settings
          - entity: input_number.grid_charge_forecast_threshold
          - entity: input_number.battery_efficiency_rte
          - entity: input_number.agile_spike_threshold_p
          - entity: input_number.min_export_margin_p
          - type: section
            label: Summer Fallbacks
          - entity: input_number.summer_evening_usage_kwh
          - entity: input_number.summer_reserve_floor
          - type: section
            label: Winter Fallbacks
          - entity: input_boolean.winter_mode
            icon: mdi:snowflake
          - entity: input_number.winter_evening_usage_kwh
          - entity: input_number.winter_reserve_floor
          - type: section
            label: Holiday Override
          - entity: input_boolean.holiday_mode
          - entity: input_number.holiday_morning_usage_kwh
          - entity: input_number.holiday_evening_usage_kwh
          - entity: input_number.holiday_reserve_floor

