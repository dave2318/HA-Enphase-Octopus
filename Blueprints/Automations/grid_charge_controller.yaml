blueprint:
  name: "Energy: Battery Grid Charge Controller (V6.2 Self-Tuning)"
  description: >-
    Manages CFG mode based on solar forecast.
    Uses AI-learned morning house load and exact darkness burn rates to calculate the perfect target SOC.
  domain: automation
  input:
    cfg_sensor_soc:
      name: Battery SOC Sensor
      selector:
        entity:
          domain: sensor
          device_class: battery
    cfg_sensor_morning_avg:
      name: 7-Day Average Morning Usage Sensor
      selector:
        entity:
          domain: sensor
    cfg_switch_export:
      name: Battery Export Switch (DTG)
      selector:
        entity:
          domain: switch
    cfg_switch_charge:
      name: Battery Grid Charge Switch (CFG)
      selector:
        entity:
          domain: switch
    cfg_event_import_today:
      name: Octopus Import Rates Today
      selector:
        entity:
          domain: event
    cfg_notify_service:
      name: Notification Entity
      default: notify.notify
      selector:
        text:

mode: single

triggers:
  - at: "23:30:00"
    trigger: time

actions:
  - condition: template
    value_template: >-
      {% set dtg = states[cfg_switch_export].last_changed %}  
      {{ dtg == None or (now() - dtg).total_seconds() > 60 }}

  - variables:
      forecast_low: "{{ is_state('binary_sensor.grid_charge_recommended', 'on') }}"
      
      morning_yield: >
        {% set tom_forecast_data = state_attr('sensor.solcast_pv_forecast_forecast_tomorrow', 'detailedForecast') %}
        {% set ns = namespace(yield=0.0) %}
        {% if tom_forecast_data %}
          {% for slot in tom_forecast_data %}
            {% set slot_dt = as_datetime(slot.period_start) | as_local %}
            {% if slot_dt >= today_at('05:00') + timedelta(days=1) and slot_dt < today_at('11:00') + timedelta(days=1) %}
              {% set ns.yield = ns.yield + slot.pv_estimate | float(0) %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.yield }}

      historical_morning_load: >
        {% if is_state('input_boolean.holiday_mode', 'on') %}
          {{ states('input_number.holiday_morning_usage_kwh') | float(1.5) }}
        {% else %}
          {% set val = states(cfg_sensor_morning_avg) | float(0) %}
          {{ val if val > 0 else 3.5 }}
        {% endif %}

      target_soc: >
        {% if forecast_low %}
          100
        {% else %}
          {% set battery_cap_kwh = states('sensor.envoy_EnvoyMAC_battery_capacity') | float(5000) / 1000 %}
          {% set hourly_burn = historical_morning_load / 11.0 %}
          {% set survival_kwh = hourly_burn * 6.0 %}
          {% set total_morning_deficit = historical_morning_load - morning_yield %}
          {% set deficit = [0.0, total_morning_deficit] | max %}
          {% set needed_kwh = [survival_kwh, deficit] | max %}
          {% set survival_target = (((needed_kwh / battery_cap_kwh) * 100) | int + 5) %}
          {{ [100, [survival_target, 20]|max]|min | round(0) }}
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ states(cfg_sensor_soc) | float(0) < target_soc | float(0) }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: "{{ cfg_switch_charge }}"
          
          - action: "{{ cfg_notify_service }}"
            data:
              title: "🔋 Grid Charging Started"
              message: >-
                Target SOC set to {{ target_soc }}%. 
                (Morning Expectation: {{ historical_morning_load | round(1) }} kWh, Solar Prediction: {{ morning_yield | round(1) }} kWh).
          
          # V6.2 Hold at 100 Logic
          - wait_template: >
              {{ (states(cfg_sensor_soc) | float(0) >= target_soc | float(0)) and (target_soc | float(0) < 100) }}
            timeout: "05:29:00"
            continue_on_timeout: true
            
          - action: switch.turn_off
            target:
              entity_id: "{{ cfg_switch_charge }}"
