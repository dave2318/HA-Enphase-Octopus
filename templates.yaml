# templates.yaml - Master Consolidated Version (V6.2 Final Architecture)

- sensor:
    - name: "Morning Solar Yield Forecast"
      unique_id: morning_solar_yield_forecast
      unit_of_measurement: "kWh"
      icon: mdi:weather-sunset-up
      state: >
        {% set tom_forecast_data = state_attr('sensor.solcast_pv_forecast_forecast_tomorrow', 'detailedForecast') %}
        {% set ns = namespace(yield=0.0) %}
        {% if tom_forecast_data %}
          {% for slot in tom_forecast_data %}
            {% set slot_dt = as_datetime(slot.period_start) | as_local %}
            {% if slot_dt >= today_at('05:00') + timedelta(days=1) and slot_dt < today_at('11:00') + timedelta(days=1) %}
              {% set ns.yield = ns.yield + slot.pv_estimate | float(0) %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.yield | round(2) }}

    - name: "Calculated Target SOC"
      unique_id: calculated_target_soc
      unit_of_measurement: "%"
      icon: mdi:finance
      state: >
        {% set threshold = states('input_number.grid_charge_forecast_threshold') | float(12.0) %}
        {% set forecast = states('sensor.combined_solar_forecast_tomorrow') | float(0) %}
        {% set morning_yield = states('sensor.morning_solar_yield_forecast') | float(0) %}
        {% set battery_cap_kwh = states('sensor.envoy_EnvoyMAC_battery_capacity') | float(5000) / 1000 %}
        
        {# --- 1. SURVIVAL MATH (Standard V5.2 Logic) --- #}
        {% if is_state('input_boolean.holiday_mode', 'on') %}
          {% set historical_morning_load = states('input_number.holiday_morning_usage_kwh') | float(1.5) %}
        {% else %}
          {% set raw_avg = states('sensor.average_morning_usage_7d') | float(0) %}
          {% set historical_morning_load = raw_avg if raw_avg > 0 else 3.5 %}
        {% endif %}
        
        {% set hourly_burn = historical_morning_load / 11.0 %}
        {% set survival_kwh = hourly_burn * 6.0 %}
        {% set deficit = [0.0, historical_morning_load - morning_yield] | max %}
        
        {% set needed_kwh = [survival_kwh, deficit] | max %}
        {% set survival_target = (((needed_kwh / battery_cap_kwh) * 100) | int + 5) %}
        {% set survival_target = [100, [survival_target, 20]|max]|min | round(0) %}

        {# --- 2. ARBITRAGE MATH (V6.0 Wall Street Upgrade) --- #}
        {% set rte = states('input_number.battery_efficiency_rte') | float(0.83) %}
        {% set raw_imp = states('sensor.octopus_energy_electricity_OctopusImportMPAN_current_rate') | float(0) %}
        {% set import_rate = (raw_imp * 100) if raw_imp < 1.0 else raw_imp %}

        {% set export_event = state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_next_day_rates', 'rates') or [] %}
        {% set current_event = state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_current_day_rates', 'rates') or [] %}
        {% set rates = export_event if export_event | length > 0 else current_event %}
        
        {% set ns = namespace(total=0.0, count=0) %}
        {% for r in rates %}
          {% set start_dt = as_datetime(r.start) | as_local %}
          {% if start_dt.time() >= strptime('09:00', '%H:%M').time() and start_dt.time() < strptime('16:00', '%H:%M').time() %}
            {% set val = r.value_inc_vat %}
            {% set rate_p = (val * 100) if val < 1.0 else val %}
            {% set ns.total = ns.total + rate_p %}
            {% set ns.count = ns.count + 1 %}
          {% endif %}
        {% endfor %}
        
        {% set avg_day_export = (ns.total / ns.count) if ns.count > 0 else 0 %}
        {% set is_profitable = (avg_day_export * rte) > import_rate %}

        {# --- 3. THE FINAL DECISION --- #}
        {% if is_profitable %}
          100  {# Wall Street Override: Pure profit available, fill the battery! #}
        {% elif forecast < threshold %}
          100  {# Bad Weather Override: Sun is terrible, fill up for safety! #}
        {% else %}
          {{ survival_target }}  {# Survival Mode: Normal self-consumption behavior #}
        {% endif %}

    - name: "Export Profitability"
      unique_id: export_profitability_calc
      unit_of_measurement: "p"
      state: >
        {% set raw_exp = states('sensor.octopus_energy_electricity_OctopusExportMPAN_export_current_rate') | float(0) %}
        {% set raw_imp = states('sensor.octopus_energy_electricity_OctopusImportMPAN_current_rate') | float(0) %}
        {% set export = (raw_exp * 100) if raw_exp < 1.0 else raw_exp %}
        {% set import = (raw_imp * 100) if raw_imp < 1.0 else raw_imp %}
        {% set rte = states('input_number.battery_efficiency_rte') | float(0.83) %}
        {{ (export - (import / rte)) | round(2) }}

    - name: "Battery Export Floor"
      unique_id: battery_export_floor
      unit_of_measurement: "%"
      icon: mdi:slope-downhill
      state: >
        {% set avg_usage = states('sensor.average_evening_usage_7d') | float(0) %}
        {% set battery_cap_kwh = states('sensor.envoy_EnvoyMAC_battery_capacity') | float(5000) / 1000 %}
        {% set rte = states('input_number.battery_efficiency_rte') | float(0.83) %}
        {% set solar_remaining = states('sensor.combined_solar_forecast_remaining') | float(0) %}
        
        {% if is_state('input_boolean.holiday_mode', 'on') %}
          {% set reserve_floor = states('input_number.holiday_reserve_floor') | float(10.0) %}
          {% set evening_req_kwh = states('input_number.holiday_evening_usage_kwh') | float(0.5) %}
        {% else %}
          {% if is_state('input_boolean.winter_mode', 'on') %}
            {% set reserve_floor = states('input_number.winter_reserve_floor') | float(30.0) %}
            {% set fallback_usage = states('input_number.winter_evening_usage_kwh') | float(4.5) %}
          {% else %}
            {% set reserve_floor = states('input_number.summer_reserve_floor') | float(20.0) %}
            {% set fallback_usage = states('input_number.summer_evening_usage_kwh') | float(2.8) %}
          {% endif %}
          {% set evening_req_kwh = avg_usage if avg_usage > (fallback_usage * 0.6) else fallback_usage %} 
        {% endif %}
        
        {% set gap = (evening_req_kwh - solar_remaining) %}
        {% set needed_soc = ((gap / (battery_cap_kwh * rte)) * 100) + 6.0 %}
        {% set standard_floor = [reserve_floor, [needed_soc, 95]|min]|max | round(0) %}

        {# --- V6.2: GOD MODE & SPIKE OVERRIDE --- #}
        {% set raw_exp = states('sensor.octopus_energy_electricity_OctopusExportMPAN_export_current_rate') | float(0) %}
        {% set current_rate_p = (raw_exp * 100) if raw_exp < 1.0 else raw_exp %}
        {% set spike_threshold = states('input_number.agile_spike_threshold_p') | float(50.0) %}

        {% set rates = state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_current_day_rates', 'rates') or [] %}
        {% set ns = namespace(upcoming_spike=false) %}
        
        {% for r in rates %}
          {% set val = r.value_inc_vat %}
          {% set rate_p = (val * 100) if val < 1.0 else val %}
          {% set start_dt = as_datetime(r.start) | as_local %}
          {% if start_dt.time() >= strptime('16:30', '%H:%M').time() and start_dt.time() < strptime('19:00', '%H:%M').time() %}
            {% if rate_p >= spike_threshold %}
              {% set ns.upcoming_spike = true %}
            {% endif %}
          {% endif %}
        {% endfor %}

        {% if current_rate_p >= spike_threshold or ns.upcoming_spike %}
          {{ reserve_floor }} 
        {% else %}
          {{ standard_floor }} 
        {% endif %}
        
    - name: "Dynamic Reserve"
      unique_id: dynamic_reserve_calc
      unit_of_measurement: "%"
      state: >
        {% set forecast = states('sensor.combined_solar_forecast_today') | float(0) %}
        {% set actual = states('sensor.envoy_EnvoyMAC_energy_production_today') | float(0) %}
        {% if is_state('input_boolean.winter_mode', 'on') %}
           {% if forecast > 10 %} 70 {% else %} 90 {% endif %}
        {% else %}
           {% if forecast > 8 or actual > 5 %} 60 
           {% elif forecast > 3 or actual > 2 %} 75 
           {% else %} 85 {% endif %}
        {% endif %}

    - name: "Solar Production Clean kW"
      unique_id: solar_production_clean_kw
      unit_of_measurement: "kW"
      device_class: power
      state: >
        {% set val = states('sensor.envoy_EnvoyMAC_current_power_production') | float(0) %}
        {{ (val if val < 100 else val / 1000) | round(2) }}

    - name: "Grid Net Power kW"
      unique_id: grid_net_power_kw
      unit_of_measurement: "kW"
      device_class: power
      state: >
        {{ states('sensor.envoy_EnvoyMAC_current_net_power_consumption') | float(0) | round(2) }}

    - name: "House Consumption Clean kW"
      unique_id: house_consumption_clean_kw
      unit_of_measurement: "kW"
      device_class: power
      state: >
        {% set val = states('sensor.envoy_EnvoyMAC_current_power_consumption') | float(0) %}
        {{ (val if val < 100 else val / 1000) | round(2) }}

    - name: "Battery Time Remaining Real World"
      unique_id: battery_time_remaining_real_world
      unit_of_measurement: "h"
      icon: mdi:timer-sand
      state: >
        {% set capacity = states('sensor.envoy_EnvoyMAC_battery_capacity') | float(5000) / 1000 %}
        {% set soc = states('sensor.envoy_EnvoyMAC_battery') | float(0) / 100 %}
        {% set reserve = 0.06 %}
        {% set rte = states('input_number.battery_efficiency_rte') | float(0.83) %}
        {% set evening_kwh = states('sensor.average_evening_usage_7d') | float(0) %}
        {% set burn_rate_kw = (evening_kwh / 7) if evening_kwh > 0 else 0.3 %}
        
        {% if soc > reserve %}
          {{ (((soc - reserve) * capacity * rte) / burn_rate_kw) | round(1) }}
        {% else %} 
          0.0 
        {% endif %}

    - name: "Battery Depleted At"
      unique_id: battery_depleted_at
      icon: mdi:clock-end
      state: >
        {% set hours = states('sensor.battery_time_remaining_real_world') | float(0) %}
        {% if hours > 0 %} {{ (now() + timedelta(hours=hours)).strftime('%H:%M') }}
        {% else %} "At Reserve" {% endif %}

    - name: "Combined Solar Forecast Today"
      unique_id: combined_solar_forecast_today
      unit_of_measurement: "kWh"
      state: "{{ states('sensor.solcast_pv_forecast_forecast_today') | float(0) | round(2) }}"

    - name: "Combined Solar Forecast Tomorrow"
      unique_id: combined_solar_forecast_tomorrow
      unit_of_measurement: "kWh"
      state: "{{ states('sensor.solcast_pv_forecast_forecast_tomorrow') | float(0) | round(2) }}"

    - name: "Combined Solar Forecast Remaining"
      unique_id: combined_solar_forecast_remaining
      unit_of_measurement: "kWh"
      state: "{{ states('sensor.solcast_pv_forecast_forecast_remaining_today') | float(0) | round(2) }}"

    - name: "Combined Solar Forecast Power"
      unique_id: combined_solar_forecast_power
      unit_of_measurement: "kW"
      device_class: power
      state: >
        {% set forecast = state_attr('sensor.solcast_pv_forecast_forecast_today', 'detailedForecast') %}
        {% if forecast is not none %}
          {% set current = now() %}
          {% set ns = namespace(val=0.0) %}
          {% for slot in forecast %}
            {% set start = as_datetime(slot.period_start) | as_local %}
            {% set end = start + timedelta(minutes=30) %}
            {% if current >= start and current < end %}
              {% set ns.val = slot.pv_estimate | float(0) %}
            {% endif %}
          {% endfor %}
          {{ ns.val | round(2) }}
        {% else %}
          0.0
        {% endif %}

    - name: "Next Greener Night"
      unique_id: next_greener_night
      icon: mdi:leaf
      state: >
        {% set next_start = state_attr('binary_sensor.octopus_energy_a_OctopusAccountId_greenness_forecast_highlighted', 'next_start') %}
        {% if next_start %}
          {{ as_timestamp(next_start) | timestamp_custom('%a %d %b, %H:%M') }}
        {% else %}
          None Scheduled
        {% endif %}

- binary_sensor:
    - name: "Grid Charge Recommended"
      unique_id: grid_charge_recommended
      state: >
        {% set threshold = states('input_number.grid_charge_forecast_threshold') | float(12.0) %}
        {% set forecast = states('sensor.combined_solar_forecast_tomorrow') | float(0) %}
        {% set forecast_low = forecast < threshold %}
        
        {% set imp_today = state_attr('event.octopus_energy_electricity_OctopusImportMPAN_current_day_rates', 'rates') or [] %}
        {% set imp_tom = state_attr('event.octopus_energy_electricity_OctopusImportMPAN_next_day_rates', 'rates') or [] %}
        {% set all_imp = imp_today + imp_tom %}
        {% set ns = namespace(charge_rates=[], max_export=0.0) %}
        
        {% for r in all_imp %}
          {% set dt = as_datetime(r.start) | as_local %}
          {% if dt >= today_at('23:30') and dt < today_at('05:30') + timedelta(days=1) %}
            {% set ns.charge_rates = ns.charge_rates + [r.value_inc_vat * 100] %}
          {% endif %}
        {% endfor %}
        
        {% set exp_rates = state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_next_day_rates', 'rates') or [] %}
        {% for r in exp_rates %}
            {% if (r.value_inc_vat * 100) > ns.max_export %}{% set ns.max_export = (r.value_inc_vat * 100) %}{% endif %}
        {% endfor %}
        
        {% set avg_import = (ns.charge_rates | sum / ns.charge_rates | length) if ns.charge_rates | length > 0 else 999.0 %}
        {% set rte = states('input_number.battery_efficiency_rte') | float(0.83) %}
        {% set arbitrage_margin_ok = ns.max_export > (avg_import / rte) %}
        
        {% set solar_ceiling = threshold + 6.0 %}
        {% set forecast_massive = forecast >= solar_ceiling %}
        
        {% set tom_forecast_data = state_attr('sensor.solcast_pv_forecast_forecast_tomorrow', 'detailedForecast') %}
        {% set ns_solar = namespace(morning_yield=0.0) %}
        
        {% if tom_forecast_data is not none %}
          {% for slot in tom_forecast_data %}
            {% set slot_dt = as_datetime(slot.period_start) | as_local %}
            {% if slot_dt >= today_at('05:00') + timedelta(days=1) and slot_dt < today_at('11:00') + timedelta(days=1) %}
              {% set ns_solar.morning_yield = ns_solar.morning_yield + slot.pv_estimate | float(0) %}
            {% endif %}
          {% endfor %}
        {% endif %}
        
        {% if is_state('input_boolean.holiday_mode', 'on') %}
          {% set historical_morning_load = states('input_number.holiday_morning_usage_kwh') | float(1.5) %}
        {% else %}
          {% set raw_avg = states('sensor.average_morning_usage_7d') | float(0) %}
          {% set historical_morning_load = raw_avg if raw_avg > 0 else 3.5 %}
        {% endif %}
        
        {% set morning_deficit = ns_solar.morning_yield < historical_morning_load %}
        
        {% set hourly_burn = historical_morning_load / 11.0 %}
        {% set survival_kwh = hourly_burn * 6.0 %}
        {% set battery_cap_kwh = states('sensor.envoy_EnvoyMAC_battery_capacity') | float(5000) / 1000 %}
        {% set survival_floor = ((survival_kwh / battery_cap_kwh) * 100) | int + 5 %}
        {% set current_soc = states('sensor.envoy_EnvoyMAC_battery') | float(0) %}
        {% set needs_survival_charge = current_soc < survival_floor %}

        {{ needs_survival_charge or forecast_low or (arbitrage_margin_ok and (not forecast_massive or morning_deficit)) }}

    - name: "In Cheap Import Window"
      unique_id: in_cheap_window
      state: >
        {% set t = now().time() %}
        {{ t >= strptime('23:30', '%H:%M').time() or t < strptime('06:30', '%H:%M').time() }}

    - name: "In Peak Window"
      unique_id: in_peak_window
      state: >
        {% set t = now().time() %}
        {{ t >= strptime('16:30', '%H:%M').time() and t < strptime('19:00', '%H:%M').time() }}

    - name: "Smart Peak Export Active"
      unique_id: smart_peak_export_active
      state: >
        {# --- 0. IOG / DTG COLLISION SHIELD --- #}
        {% if is_state('binary_sensor.octopus_energy_IntelligentDispatchVehicleId_intelligent_dispatching', 'on') %}
          false
        {% else %}
          
          {% set raw_exp = states('sensor.octopus_energy_electricity_OctopusExportMPAN_export_current_rate') | float(0) %}
          {% set current_rate_p = (raw_exp * 100) if raw_exp < 1.0 else raw_exp %}
          {% set spike_threshold = states('input_number.agile_spike_threshold_p') | float(50.0) %}
          
          {% set soc = states('sensor.envoy_EnvoyMAC_battery') | float(0) %}
          {% set floor = states('sensor.battery_export_floor') | float(0) %}
          
          {# --- 1. GOD MODE OVERRIDE (Any time of day) --- #}
          {% if current_rate_p >= spike_threshold %}
            {{ soc > (floor + 3) }}
          
          {# --- 2. STANDARD PEAK WINDOW (16:30 - 19:00) --- #}
          {% else %}
            {% set t = now().time() %}
            {% if t < strptime('16:30', '%H:%M').time() or t >= strptime('19:00', '%H:%M').time() %}
              false
            {% else %}
              {% set battery_cap_kwh = states('sensor.envoy_EnvoyMAC_battery_capacity') | float(5000) / 1000 %}
              {% set export_volume = ((soc - floor) / 100) * battery_cap_kwh %}
              {% set slots_needed = 3 if export_volume > 2.8 else (2 if export_volume > 1.4 else 1) %}
              {% set min_export_price = states('input_number.min_export_margin_p') | float(12.0) %}

              {% set rates = state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_current_day_rates', 'rates') or [] %}
              {% set peak_rates = namespace(data=[]) %}
              {% for r in rates %}
                {% set start_dt = as_datetime(r.start) | as_local %}
                {% set val = r.value_inc_vat %}
                {% set rate_p = (val * 100) if val < 1.0 else val %}
                {% if start_dt.time() >= strptime('16:30', '%H:%M').time() and start_dt.time() < strptime('19:00', '%H:%M').time() %}
                  {% if rate_p >= min_export_price %}
                    {% set peak_rates.data = peak_rates.data + [{'start': start_dt, 'end': as_datetime(r.end) | as_local, 'rate': rate_p}] %}
                  {% endif %}
                {% endif %}
              {% endfor %}

              {% set sorted_slots = peak_rates.data | sort(attribute='rate', reverse=true) %}
              {% set target_slots = sorted_slots[:slots_needed] %}
              
              {% set ns = namespace(active=false) %}
              {% for slot in target_slots %}
                {% if now() >= slot.start and now() < slot.end %}
                  {% set ns.active = true %}
                {% endif %}
              {% endfor %}

              {% set has_profitable_slots = peak_rates.data | length > 0 %}
              {% set last_chance = t >= strptime('18:30', '%H:%M').time() and has_profitable_slots %}
              
              {{ (ns.active or last_chance) and soc > (floor + 3) }}
            {% endif %}
          {% endif %}

        {% endif %}

    - name: "Hard Block Active"
      unique_id: hard_block_binary
      state: >
        {% set raw_rate = states('sensor.octopus_energy_electricity_OctopusImportMPAN_current_rate') | float(99) %}
        {% set import_rate = (raw_rate * 100) if raw_rate < 1.0 else raw_rate %}
        
        {% set rates = state_attr('event.octopus_energy_electricity_OctopusImportMPAN_current_day_rates', 'rates') or [] %}
        {% if rates | length > 0 %}
          {% set min_rate_pounds = rates | map(attribute='value_inc_vat') | min | float(0.0349) %}
          {% set dynamic_threshold = (min_rate_pounds * 100) + 0.5 %}
        {% else %}
          {% set dynamic_threshold = 3.99 %}
        {% endif %}

        {{ is_state('binary_sensor.octopus_energy_IntelligentDispatchVehicleId_intelligent_dispatching', 'on') 
           or is_state('binary_sensor.in_cheap_import_window', 'on') 
           or import_rate <= dynamic_threshold }}

    - name: "Enphase Gateway Status"
      unique_id: enphase_gateway_status_binary
      device_class: connectivity
      state: "{{ 'off' if is_state('sensor.envoy_EnvoyMAC_battery', 'unavailable') else 'on' }}"

- trigger:
    - platform: state
      entity_id: sensor.envoy_EnvoyMAC_available_battery_energy
    - platform: time
      at: "00:00:00"
  sensor:
    - name: "Calculated Battery Daily Discharge"
      unique_id: calculated_battery_daily_discharge
      unit_of_measurement: "kWh"
      state_class: total_increasing
      device_class: energy
      state: >
        {% set total = states('sensor.calculated_battery_daily_discharge') | float(0) %}
        {% if trigger.platform == 'time' %} 
          0.0
        {% elif trigger.from_state is defined and trigger.to_state is defined %}
          {% if trigger.to_state.state in ['unknown', 'unavailable'] or trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ total }}
          {% else %}
            {% set current = trigger.to_state.state | float(0) %}
            {% set previous = trigger.from_state.state | float(0) %}
            {% if previous > current %} 
              {{ (total + (previous - current) / 1000) | round(3) }}
            {% else %} 
              {{ total }} 
            {% endif %}
          {% endif %}
        {% else %}
          {{ total }}
        {% endif %}

    - name: "Calculated Battery Daily Charge"
      unique_id: calculated_battery_daily_charge
      unit_of_measurement: "kWh"
      state_class: total_increasing
      device_class: energy
      state: >
        {% set total = states('sensor.calculated_battery_daily_charge') | float(0) %}
        {% if trigger.platform == 'time' %} 
          0.0
        {% elif trigger.from_state is defined and trigger.to_state is defined %}
          {% if trigger.to_state.state in ['unknown', 'unavailable'] or trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ total }}
          {% else %}
            {% set current = trigger.to_state.state | float(0) %}
            {% set previous = trigger.from_state.state | float(0) %}
            {% if current > previous %} 
              {{ (total + (current - previous) / 1000) | round(3) }}
            {% else %} 
              {{ total }} 
            {% endif %}
          {% endif %}
        {% else %}
          {{ total }}
        {% endif %}

    - name: "Grid Battery Daily Charge"
      unique_id: grid_battery_daily_charge
      unit_of_measurement: "kWh"
      state_class: total_increasing
      device_class: energy
      state: >
        {% set total = states('sensor.grid_battery_daily_charge') | float(0) %}
        {% if trigger.platform == 'time' %} 
          0.0
        {% elif trigger.from_state is defined and trigger.to_state is defined %}
          {% if trigger.to_state.state in ['unknown', 'unavailable'] or trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ total }}
          {% else %}
            {% set current = trigger.to_state.state | float(0) %}
            {% set previous = trigger.from_state.state | float(0) %}
            {% set in_cheap_window = is_state('binary_sensor.in_cheap_import_window', 'on') %}
            
            {% if current > previous and in_cheap_window %} 
              {{ (total + (current - previous) / 1000) | round(3) }}
            {% else %} 
              {{ total }} 
            {% endif %}
          {% endif %}
        {% else %}
          {{ total }}
        {% endif %}

- trigger:
    - platform: state
      entity_id: sensor.grid_energy_export_today
    - platform: time
      at: "00:00:00"
  sensor:
    - name: "Today Export Profit Accumulative"
      unique_id: today_export_profit_accumulative
      unit_of_measurement: "£"
      icon: mdi:cash-check
      state: >
        {% set current_profit = states('sensor.today_export_profit_accumulative') | float(0) %}
        {% if trigger.platform == 'time' %} 
          0.0
        {% elif trigger.from_state is defined and trigger.to_state is defined %}
          {% if trigger.to_state.state in ['unknown', 'unavailable'] or trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ current_profit }}
          {% else %}
            {% set exported_now = (trigger.to_state.state | float(0)) - (trigger.from_state.state | float(0)) %}
            {% if exported_now > 0 %}
              {% set raw_rate = states('sensor.octopus_energy_electricity_OctopusExportMPAN_export_current_rate') | float(0) %}
              {% set rate = ((raw_rate * 100) if raw_rate < 1.0 else raw_rate) / 100 %}
              {{ (current_profit + (exported_now * rate)) | round(4) }}
            {% else %} 
              {{ current_profit }} 
            {% endif %}
          {% endif %}
        {% else %} 
          {{ current_profit }} 
        {% endif %}

    - name: "Today Peak DTG Export"
      unique_id: today_peak_dtg_export
      unit_of_measurement: "kWh"
      icon: mdi:battery-arrow-up
      state: >
        {% set current = states('sensor.today_peak_dtg_export') | float(0) %}
        {% if trigger.platform == 'time' %} 
          0.0
        {% elif is_state('switch.enphase_dtg_mode', 'on') %}
          {% if trigger.to_state.state in ['unknown', 'unavailable'] or trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ current }}
          {% else %}
            {% set exported_now = (trigger.to_state.state | float(0)) - (trigger.from_state.state | float(0)) %}
            {% if exported_now > 0 %}
              {{ (current + exported_now) | round(3) }}
            {% else %}
              {{ current }}
            {% endif %}
          {% endif %}
        {% else %}
          {{ current }}
        {% endif %}

    - name: "Today Peak DTG Profit"
      unique_id: today_peak_dtg_profit
      unit_of_measurement: "£"
      icon: mdi:cash-fast
      state: >
        {% set current_profit = states('sensor.today_peak_dtg_profit') | float(0) %}
        {% if trigger.platform == 'time' %} 
          0.0
        {% elif is_state('switch.enphase_dtg_mode', 'on') %}
          {% if trigger.to_state.state in ['unknown', 'unavailable'] or trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ current_profit }}
          {% else %}
            {% set exported_now = (trigger.to_state.state | float(0)) - (trigger.from_state.state | float(0)) %}
            {% if exported_now > 0 %}
              {% set raw_rate = states('sensor.octopus_energy_electricity_OctopusExportMPAN_export_current_rate') | float(0) %}
              {% set rate = ((raw_rate * 100) if raw_rate < 1.0 else raw_rate) / 100 %}
              {{ (current_profit + (exported_now * rate)) | round(4) }}
            {% else %} 
              {{ current_profit }} 
            {% endif %}
          {% endif %}
        {% else %} 
          {{ current_profit }} 
        {% endif %}

- trigger:
    - platform: state
      entity_id: event.octopus_energy_electricity_OctopusExportMPAN_export_current_day_rates
    - platform: state
      entity_id: sensor.envoy_EnvoyMAC_battery
  sensor:
    - name: "Today's Golden Export Slot"
      unique_id: todays_golden_export_slot
      icon: mdi:star-clock
      state: >
        {% set soc = states('sensor.envoy_EnvoyMAC_battery') | float(0) %}
        {% set floor = states('sensor.battery_export_floor') | float(0) %}
        {% set battery_cap_kwh = states('sensor.envoy_EnvoyMAC_battery_capacity') | float(5000) / 1000 %}
        {% set export_volume = ((soc - floor) / 100) * battery_cap_kwh %}
        
        {# V6.2 PATCH: Perfectly matched to the Brain's volume math #}
        {% set slots_needed = 3 if export_volume > 2.8 else (2 if export_volume > 1.4 else 1) %}

        {% set ns = namespace(peak_data=[]) %}
        {% set min_export_price = states('input_number.min_export_margin_p') | float(12.0) %}
        
        {% set rates = state_attr('event.octopus_energy_electricity_OctopusExportMPAN_export_current_day_rates', 'rates') or [] %}
        
        {% for r in rates %}
          {% set start = as_datetime(r.start) | as_local %}
          {% set val = r.value_inc_vat %}
          {% set rate_p = (val * 100) if val < 1.0 else val %}
          
          {% if start.time() >= strptime('16:30', '%H:%M').time() and start.time() < strptime('19:00', '%H:%M').time() %}
             {% if rate_p >= min_export_price %}
               {% set ns.peak_data = ns.peak_data + [{'time': start.strftime('%H:%M'), 'rate': rate_p}] %}
             {% endif %}
          {% endif %}
        {% endfor %}

        {% set sorted_slots = ns.peak_data | sort(attribute='rate', reverse=true) %}
        
        {% if sorted_slots | length > 0 %}
          {# Dynamically display 1, 2, or 3 slots separated by '&' #}
          {% set display_slots = sorted_slots[:slots_needed] | sort(attribute='time') %}
          {{ display_slots | map(attribute='time') | join(' & ') }}
        {% else %}
          None (>{{ min_export_price }}p)
        {% endif %}

